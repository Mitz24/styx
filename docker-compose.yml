services:
  coordinator:
    build:
      context: .
      dockerfile: coordinator/coordinator.dockerfile
    image: dev/styx-coordinator:latest
    ports:
      - "8886:8888"
      - "8000:8000"
    environment:
      - KAFKA_URL=kafka1:19092
      - HEARTBEAT_LIMIT=5000
      - HEARTBEAT_CHECK_INTERVAL=500
      - ENABLE_AUTOSCALE=${ENABLE_AUTOSCALE:-true}
      - ENABLE_CHRONOS=${ENABLE_CHRONOS:-true}
      - LATENCY_SCALE_UP=${LATENCY_SCALE_UP:-true}
      - LATENCY_SCALE_UP_THRESHOLD_MS=${LATENCY_SCALE_UP_THRESHOLD_MS:-250.0}
      - REACTIVE_DOWNSCALE=${REACTIVE_DOWNSCALE:-false}
      - ZERO_BACKLOG_DOWNSCALE_S=${ZERO_BACKLOG_DOWNSCALE_S:-30.0}
      - BACKLOG_DOWNSCALE_THRESHOLD=${BACKLOG_DOWNSCALE_THRESHOLD:-50.0}
      - DOWNSCALE_CPU_THRESHOLD=${DOWNSCALE_CPU_THRESHOLD:-50.0}
      - MIGRATION_COLD_START_HORIZON_SEC=${MIGRATION_COLD_START_HORIZON_SEC:-45}
      - S3_ENDPOINT=http://rustfs:9000
      - S3_ACCESS_KEY=rustfsadmin
      - S3_SECRET_KEY=rustfsadmin
    depends_on:
      - prometheus
      - grafana

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=365d"
      - "--web.enable-admin-api"

  grafana:
    image: grafana/grafana:11.5.2-ubuntu
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards

  worker:
    build:
      context: .
      dockerfile: worker/worker.dockerfile
    image: dev/styx-worker:latest
    environment:
      - INGRESS_TYPE=KAFKA
      - KAFKA_URL=kafka1:19092
      - DISCOVERY_HOST=coordinator
      - DISCOVERY_PORT=8888
      - S3_ENDPOINT=http://rustfs:9000
      - S3_ACCESS_KEY=rustfsadmin
      - S3_SECRET_KEY=rustfsadmin
    depends_on:
      - coordinator
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "8GB"

  worker-standby:
    profiles:
      - autoscale
    build:
      context: .
      dockerfile: worker/worker.dockerfile
    image: dev/styx-worker-standby:latest
    environment:
      - INGRESS_TYPE=KAFKA
      - KAFKA_URL=kafka1:19092
      - DISCOVERY_HOST=coordinator
      - DISCOVERY_PORT=8888
      - STYX_START_FILE=/tmp/styx_start
      - WORKER_STANBY=true
      - S3_ENDPOINT=http://rustfs:9000
      - S3_ACCESS_KEY=rustfsadmin
      - S3_SECRET_KEY=rustfsadmin
    depends_on:
      - coordinator
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "8GB"

volumes:
  grafana_data:
